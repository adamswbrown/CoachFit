<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Heartbeat/pulse line -->
  <polyline
    points="140,540 300,540 360,540 400,400 440,680 480,340 520,640 560,480 600,540 720,540 760,540 884,540"
    fill="none"
    stroke="#4ECDC4"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Coaching checkmark (top right area) -->
  <polyline
    points="620,280 680,340 780,220"
    fill="none"
    stroke="#4ECDC4"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Subtle circle around checkmark -->
  <circle cx="700" cy="280" r="100" fill="none" stroke="#4ECDC4" stroke-width="8" opacity="0.3"/>

  <!-- "CF" subtle text at bottom -->
  <text x="512" y="780" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, Arial" font-weight="600" font-size="80" fill="#4ECDC4" opacity="0.5">COACHFIT</text>
</svg>
